<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Kushal Phuyal</title>
  <meta name="description" content="Sorry, the page you are looking for does not exist." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="images/profile.webp" type="image/webp" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:20px; }
    .err-card { background:var(--card); border:1px solid rgba(201,168,76,.2); border-radius:24px; padding:56px 48px; max-width:520px; width:100%; position:relative; z-index:2; }
    .err-num { font-family:var(--ff-head); font-size:6rem; font-weight:700; line-height:1; background:linear-gradient(110deg,var(--gold),var(--gold3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; }
    .err-card h1 { font-family:var(--ff-head); font-size:1.6rem; color:var(--white); margin-bottom:10px; }
    .err-card p  { color:var(--muted); margin-bottom:30px; line-height:1.75; }
    .err-links { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="err-card">
  <div class="err-num">404</div>
  <h1>Page Not Found</h1>
  <p>Sorry, the page you are looking for does not exist or has been moved. Let's get you back on track.</p>
  <div class="err-links">
    <a href="index.html"   class="btn btn-gold"><i class="fas fa-home"></i> Go Home</a>
    <a href="ai.html"      class="btn btn-outline"><i class="fas fa-calculator"></i> Tools</a>
    <a href="contact.html" class="btn btn-dark"><i class="fas fa-envelope"></i> Contact</a>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
